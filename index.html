<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080b12">
<title>Finova — Smart Money Management</title>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  /* Surfaces */
  --bg:        #080b12;
  --bg2:       #0e1118;
  --bg3:       #131824;
  --card:      #161c28;
  --card2:     #1c2334;
  --card3:     #212840;
  --glass:     rgba(22,28,40,0.85);

  /* Borders */
  --b1: rgba(255,255,255,0.055);
  --b2: rgba(255,255,255,0.10);
  --b3: rgba(255,255,255,0.16);

  /* Text */
  --t1: #eef0f6;
  --t2: #7e8ba8;
  --t3: #44506a;

  /* Brand */
  --p:    #3b82f6;       /* primary blue */
  --p2:   #60a5fa;       /* lighter blue */
  --pg:   linear-gradient(135deg,#3b82f6,#1d4ed8);
  --ps:   0 4px 20px rgba(59,130,246,0.38);

  /* Semantic */
  --g:    #10b981;
  --g2:   rgba(16,185,129,0.14);
  --r:    #ef4444;
  --r2:   rgba(239,68,68,0.14);
  --y:    #f59e0b;
  --y2:   rgba(245,158,11,0.14);
  --pu:   #8b5cf6;
  --pu2:  rgba(139,92,246,0.14);

  /* Geometry */
  --rad:    18px;
  --rad-m:  12px;
  --rad-s:  8px;
  --rad-xs: 5px;

  /* Motion */
  --ease: cubic-bezier(0.4,0,0.2,1);
  --tr:   all 0.22s var(--ease);
  --tr-s: all 0.15s var(--ease);

  /* Shadows */
  --sh:   0 16px 48px rgba(0,0,0,0.55);
  --sh-s: 0 4px 16px rgba(0,0,0,0.35);
  --sh-c: 0 2px 8px rgba(0,0,0,0.25);

  /* Nav */
  --nav-h: 64px;
  --tab-h: 50px;
}

/* ═══════════════════════════════════════════════════
   LIGHT THEME
═══════════════════════════════════════════════════ */
body.light {
  --bg:#f0f4fc; --bg2:#ffffff; --bg3:#e5eaf5;
  --card:#ffffff; --card2:#f5f8ff; --card3:#edf1fc;
  --glass:rgba(255,255,255,0.9);
  --b1:rgba(0,0,0,0.07); --b2:rgba(0,0,0,0.11); --b3:rgba(0,0,0,0.17);
  --t1:#111827; --t2:#4b5568; --t3:#9ca3b8;
  --sh:0 16px 48px rgba(0,0,0,0.1); --sh-s:0 4px 16px rgba(0,0,0,0.08);
}
body.light .topnav { background:rgba(240,244,252,0.95); }
body.light .tab-bar { background:#fff; }
body.light .hero-card { background:linear-gradient(135deg,#1e40af,#3b82f6); }
body.light .mini-bar-wrap { background:var(--card2); }
body.light .search-input { background:var(--card2); }
body.light select option, body.light .dd-opt { background:#e5eaf5; color:#111827; }

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Trebuchet MS', -apple-system, BlinkMacSystemFont, 'Segoe UI',
               'Noto Sans', 'Noto Sans Arabic', sans-serif;
  background:var(--bg);
  color:var(--t1);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
  padding-bottom:calc(var(--tab-h) + 32px);
  transition:background 0.3s ease, color 0.3s ease;
  overscroll-behavior:none;
}
body[dir="rtl"] { font-family:'Trebuchet MS','Noto Sans Arabic',sans-serif; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--card3); border-radius:4px; }

/* ═══════════════════════════════════════════════════
   TOP NAV
═══════════════════════════════════════════════════ */
.topnav {
  position:sticky; top:0; z-index:300;
  height:var(--nav-h);
  background:rgba(8,11,18,0.94);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--b1);
  display:flex; align-items:center;
  padding:0 20px; gap:12px;
}

/* ── Finova Logo ── */
.brand {
  display:flex; align-items:center; gap:10px; flex-shrink:0; text-decoration:none;
}
.brand-mark {
  width:38px; height:38px; border-radius:0; flex-shrink:0;
  background:transparent;
  box-shadow:none;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:visible;
}
.brand-mark::before { display:none; }
/* SVG "F" lettermark */
.brand-mark svg { position:relative; z-index:1; }
.brand-text { display:flex; flex-direction:column; line-height:1; }
.brand-name {
  font-size:18px; font-weight:800; letter-spacing:-0.5px;
  color:var(--t1);
}
.brand-tagline {
  font-size:9.5px; font-weight:600; letter-spacing:0.06em;
  color:var(--p2); margin-top:1px;
}

.nav-gap { flex:1; }

/* ── Nav Right Controls ── */
.nav-right {
  display:flex; align-items:center; gap:8px;
}

/* ── Pill Selects (language & currency) ── */
.pill-sel {
  display:flex; align-items:center; gap:5px;
  background:var(--card2); border:1px solid var(--b2);
  border-radius:var(--rad-s); padding:5px 8px 5px 6px;
  cursor:pointer; transition:var(--tr); position:relative;
}
.pill-sel:hover { border-color:var(--b3); background:var(--card3); }
.pill-flag { font-size:14px; line-height:1; flex-shrink:0; }
.pill-text {
  font-size:12px; font-weight:700; color:var(--t1);
  white-space:nowrap;
}
.pill-caret { font-size:9px; color:var(--t3); flex-shrink:0; }

/* Hidden native select layered over pill */
.pill-sel select {
  position:absolute; inset:0; opacity:0;
  cursor:pointer; width:100%; font-size:16px; /* prevent iOS zoom */
  border:none; background:none;
}
.pill-sel select:focus { outline:none; }
.pill-sel select option { background:var(--bg3); color:var(--t1); font-size:14px; }

/* ── Icon Button ── */
.icon-btn {
  width:36px; height:36px; border-radius:var(--rad-s);
  display:flex; align-items:center; justify-content:center;
  background:var(--card2); border:1px solid var(--b1);
  cursor:pointer; font-size:16px; transition:var(--tr); flex-shrink:0;
  color:var(--t2);
}
.icon-btn:hover { border-color:var(--b3); background:var(--card3); transform:scale(1.06); }
.icon-btn:active { transform:scale(0.94); }

/* ═══════════════════════════════════════════════════
   BOTTOM TAB BAR (mobile-first)
═══════════════════════════════════════════════════ */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:290;
  height:var(--tab-h);
  background:var(--bg2);
  border-top:1px solid var(--b1);
  display:flex; align-items:stretch;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  border:none; background:none;
  color:var(--t3); font-size:10px; font-weight:700;
  cursor:pointer; font-family:inherit;
  transition:var(--tr); letter-spacing:0.03em;
  padding:6px 4px;
  position:relative;
}
.tab-btn .tb-icon { font-size:18px; line-height:1; transition:var(--tr); }
.tab-btn .tb-lbl  { font-size:10px; }
.tab-btn.active   { color:var(--p2); }
.tab-btn.active .tb-icon { transform:translateY(-2px); }
.tab-btn.active::after {
  content:''; position:absolute; bottom:0; left:50%;
  transform:translateX(-50%);
  width:24px; height:3px; border-radius:3px 3px 0 0;
  background:var(--p);
}

/* FAB — Add button in tab bar */
.tab-fab {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  border:none; background:none; cursor:pointer; font-family:inherit;
  transition:var(--tr); padding:6px 4px;
}
.fab-ring {
  width:44px; height:44px; border-radius:14px;
  background:var(--pg); box-shadow:var(--ps);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; color:#fff; font-weight:300;
  transition:var(--tr); margin-top:-18px;
}
.tab-fab:active .fab-ring { transform:scale(0.92); }
.tab-fab .tb-lbl { font-size:10px; font-weight:700; color:var(--t3); margin-top:2px; }

/* ═══════════════════════════════════════════════════
   PAGES
═══════════════════════════════════════════════════ */
.page { display:none; padding:18px 16px; animation:fadeUp 0.28s var(--ease); }
.page.active { display:block; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Page header */
.ph { display:flex; align-items:center; justify-content:space-between;
      margin-bottom:18px; gap:10px; flex-wrap:wrap; }
.ph h2 { font-size:20px; font-weight:800; letter-spacing:-0.4px; }
.ph p  { font-size:12.5px; color:var(--t2); margin-top:2px; }
.ph-left { display:flex; flex-direction:column; }

/* ═══════════════════════════════════════════════════
   HERO BALANCE CARD (Dashboard)
═══════════════════════════════════════════════════ */
.hero-card {
  border-radius:var(--rad);
  background:linear-gradient(140deg,#1e3a8a 0%,#1d4ed8 45%,#2563eb 100%);
  padding:22px 22px 18px;
  margin-bottom:16px;
  position:relative; overflow:hidden;
  box-shadow:0 12px 40px rgba(29,78,216,0.45);
}
.hero-card::before {
  content:''; position:absolute;
  top:-60px; right:-60px;
  width:200px; height:200px; border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.hero-card::after {
  content:''; position:absolute;
  bottom:-40px; left:-20px;
  width:150px; height:150px; border-radius:50%;
  background:rgba(255,255,255,0.04);
}
.hero-inner { position:relative; z-index:1; }
.hero-top {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.hero-label {
  font-size:11px; font-weight:700; letter-spacing:0.09em;
  text-transform:uppercase; color:rgba(255,255,255,0.65);
}
.hero-badge {
  font-size:10px; font-weight:800; padding:3px 9px;
  border-radius:20px; background:rgba(255,255,255,0.15);
  color:#fff; letter-spacing:0.05em; backdrop-filter:blur(4px);
}
.hero-balance {
  font-size:34px; font-weight:800; color:#fff;
  letter-spacing:-1px; line-height:1.1; margin-bottom:18px;
  word-break:break-all;
}
.hero-stats {
  display:grid; grid-template-columns:1fr 1fr;
  gap:0; border-top:1px solid rgba(255,255,255,0.15); padding-top:14px;
}
.hero-stat { display:flex; flex-direction:column; gap:3px; }
.hero-stat:first-child { padding-right:16px; border-right:1px solid rgba(255,255,255,0.15); }
.hero-stat:last-child  { padding-left:16px; }
.hero-stat-lbl { font-size:10.5px; font-weight:600; color:rgba(255,255,255,0.6); letter-spacing:0.04em; }
.hero-stat-val { font-size:16px; font-weight:800; color:#fff; }
.hero-stat-val.inc { color:#6ee7b7; }
.hero-stat-val.exp { color:#fca5a5; }

/* ═══════════════════════════════════════════════════
   MINI STAT CARDS ROW
═══════════════════════════════════════════════════ */
.mini-stats {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:10px; margin-bottom:16px;
}
.mini-card {
  background:var(--card); border:1px solid var(--b1);
  border-radius:var(--rad-m); padding:14px 15px;
  display:flex; align-items:center; gap:12px;
  transition:var(--tr); cursor:default;
}
.mini-card:hover { border-color:var(--b2); transform:translateY(-2px); box-shadow:var(--sh-c); }
.mini-icon {
  width:38px; height:38px; border-radius:11px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.mini-icon.g  { background:var(--g2); }
.mini-icon.r  { background:var(--r2); }
.mini-icon.y  { background:var(--y2); }
.mini-icon.pu { background:var(--pu2); }
.mini-body { display:flex; flex-direction:column; gap:1px; min-width:0; }
.mini-val  { font-size:15px; font-weight:800; line-height:1.2; word-break:break-all; }
.mini-val.g  { color:var(--g); }
.mini-val.r  { color:var(--r); }
.mini-val.y  { color:var(--y); }
.mini-val.pu { color:var(--pu); }
.mini-lbl { font-size:11px; font-weight:600; color:var(--t3); }

/* ═══════════════════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════════════════ */
.sec-hdr {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.sec-title {
  font-size:12px; font-weight:800; letter-spacing:0.07em;
  text-transform:uppercase; color:var(--t3);
}
.sec-link {
  font-size:12px; font-weight:700; color:var(--p2);
  cursor:pointer; background:none; border:none;
  font-family:inherit; padding:0; transition:var(--tr);
}
.sec-link:hover { color:var(--p); }

/* ═══════════════════════════════════════════════════
   MINI BAR CHART (Dashboard sparkline)
═══════════════════════════════════════════════════ */
.chart-card {
  background:var(--card); border:1px solid var(--b1);
  border-radius:var(--rad-m); padding:16px;
  margin-bottom:16px;
}
.chart-title-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.chart-legend { display:flex; gap:12px; }
.legend-item  { display:flex; align-items:center; gap:5px;
                font-size:11px; font-weight:600; color:var(--t2); }
.legend-dot { width:7px; height:7px; border-radius:50%; }

.bar-chart-wrap {
  display:flex; align-items:flex-end; gap:4px;
  height:80px; padding-bottom:20px; position:relative;
}
.bar-group {
  flex:1; display:flex; gap:2px; align-items:flex-end; position:relative;
}
.bar {
  flex:1; border-radius:4px 4px 0 0; min-height:3px;
  transition:height 0.5s var(--ease);
  cursor:default; position:relative;
}
.bar:hover::after {
  content:attr(data-val);
  position:absolute; bottom:calc(100% + 4px); left:50%;
  transform:translateX(-50%);
  background:var(--card3); color:var(--t1);
  font-size:10px; font-weight:700; padding:2px 5px;
  border-radius:4px; white-space:nowrap;
  pointer-events:none; z-index:10;
}
.bar.income  { background:rgba(16,185,129,0.7); }
.bar.expense { background:rgba(239,68,68,0.7); }
.bar-labels {
  display:flex; gap:4px;
  position:absolute; bottom:0; left:0; right:0;
}
.bar-lbl { flex:1; text-align:center; font-size:9.5px; color:var(--t3); font-weight:600; }

/* ═══════════════════════════════════════════════════
   CATEGORY PROGRESS BARS
═══════════════════════════════════════════════════ */
.cat-list { display:flex; flex-direction:column; gap:11px; }
.cat-row  { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.cat-emoji { font-size:16px; width:24px; text-align:center; flex-shrink:0; }
.cat-name  { flex:1; font-size:13px; font-weight:600; min-width:0;
             white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cat-meta  { display:flex; align-items:center; gap:8px; }
.cat-pct   { font-size:11px; font-weight:700; color:var(--t3); min-width:28px; text-align:right; }
.cat-val   { font-size:13px; font-weight:800; min-width:60px; text-align:right; }
.prog-track { height:5px; background:var(--bg3); border-radius:5px; overflow:hidden; }
.prog-fill  { height:100%; border-radius:5px; transition:width 0.6s var(--ease); }

/* ═══════════════════════════════════════════════════
   TRANSACTION ITEMS
═══════════════════════════════════════════════════ */
.tx-list { display:flex; flex-direction:column; gap:7px; }

.tx-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px;
  background:var(--card); border:1px solid var(--b1);
  border-radius:var(--rad-m); transition:var(--tr);
  animation:fadeUp 0.2s var(--ease);
}
.tx-item:hover { border-color:var(--b2); transform:translateX(3px); box-shadow:var(--sh-c); }
body[dir="rtl"] .tx-item:hover { transform:translateX(-3px); }

.tx-ico {
  width:40px; height:40px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.tx-body { flex:1; min-width:0; }
.tx-title { font-size:13.5px; font-weight:700; white-space:nowrap;
            overflow:hidden; text-overflow:ellipsis; }
.tx-sub   { font-size:11.5px; color:var(--t2); margin-top:2px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-right { flex-shrink:0; text-align:right; }
body[dir="rtl"] .tx-right { text-align:left; }
.tx-amt   { font-size:14px; font-weight:800; }
.tx-amt.income  { color:var(--g); }
.tx-amt.expense { color:var(--r); }
.tx-date  { font-size:11px; color:var(--t3); margin-top:2px; }
.tx-actions { display:flex; gap:5px; flex-shrink:0; }
.tx-act {
  width:30px; height:30px; border-radius:var(--rad-xs);
  display:flex; align-items:center; justify-content:center;
  background:var(--bg3); border:1px solid var(--b1);
  cursor:pointer; font-size:13px; transition:var(--tr);
}
.tx-act:hover.edit { background:rgba(59,130,246,0.12); border-color:var(--p); color:var(--p2); }
.tx-act:hover.del  { background:var(--r2); border-color:var(--r); color:var(--r); }
.tx-act:active { transform:scale(0.9); }

/* ═══════════════════════════════════════════════════
   SEARCH + FILTERS BAR
═══════════════════════════════════════════════════ */
.filters-row {
  display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center;
}
.search-wrap {
  flex:1; min-width:180px; position:relative;
}
.search-ico {
  position:absolute; left:10px; top:50%; transform:translateY(-50%);
  font-size:14px; color:var(--t3); pointer-events:none;
}
.search-input {
  width:100%; background:var(--card); border:1px solid var(--b1);
  border-radius:var(--rad-s); padding:9px 10px 9px 34px;
  color:var(--t1); font-family:inherit; font-size:13px; outline:none;
  transition:var(--tr);
}
.search-input::placeholder { color:var(--t3); }
.search-input:focus { border-color:var(--p); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
body[dir="rtl"] .search-ico { left:auto; right:10px; }
body[dir="rtl"] .search-input { padding:9px 34px 9px 10px; }

.filter-sel-wrap {
  position:relative; display:flex; align-items:center;
}
.filter-sel {
  appearance:none; -webkit-appearance:none;
  background:var(--card); border:1px solid var(--b1);
  border-radius:var(--rad-s); padding:9px 28px 9px 11px;
  color:var(--t1); font-family:inherit; font-size:12.5px;
  font-weight:600; cursor:pointer; outline:none; transition:var(--tr);
}
.filter-sel:focus { border-color:var(--p); }
.filter-sel:hover { border-color:var(--b2); }
.filter-sel option { background:var(--bg3); }
.filter-arr {
  position:absolute; right:8px; pointer-events:none;
  font-size:9px; color:var(--t3);
}

.results-count { font-size:12px; color:var(--t3); font-weight:600;
                 width:100%; padding-left:2px; }

/* ═══════════════════════════════════════════════════
   ADD / EDIT FORM
═══════════════════════════════════════════════════ */
.form-card {
  background:var(--card); border:1px solid var(--b1);
  border-radius:var(--rad); padding:20px;
  max-width:540px;
}

/* Type toggle */
.type-toggle {
  display:grid; grid-template-columns:1fr 1fr;
  border-radius:var(--rad-m); overflow:hidden;
  border:1px solid var(--b1); background:var(--bg3);
  margin-bottom:20px; gap:0;
}
.type-opt {
  padding:11px 10px; text-align:center;
  font-size:13.5px; font-weight:800; cursor:pointer;
  color:var(--t2); border:none; background:transparent;
  font-family:inherit; transition:var(--tr);
  letter-spacing:0.02em;
}
.type-opt.inc.active { background:var(--g2); color:var(--g); }
.type-opt.exp.active { background:var(--r2); color:var(--r); }
.type-opt:hover:not(.active) { background:var(--card2); color:var(--t1); }
.type-opt:active { transform:scale(0.97); }

/* Grid & groups */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group-full { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.f-label {
  font-size:10.5px; font-weight:800; color:var(--t3);
  text-transform:uppercase; letter-spacing:0.08em;
}
.f-ctrl {
  background:var(--bg3); border:1px solid var(--b1);
  border-radius:var(--rad-s); padding:10px 12px;
  color:var(--t1); font-family:inherit; font-size:14px;
  outline:none; transition:var(--tr); width:100%;
  appearance:none; -webkit-appearance:none;
}
.f-ctrl:focus { border-color:var(--p); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
.f-ctrl::placeholder { color:var(--t3); }
.f-ctrl.err { border-color:var(--r); box-shadow:0 0 0 3px var(--r2); }
.f-ctrl option { background:var(--bg3); color:var(--t1); }
.err-msg { font-size:11px; color:var(--r); min-height:14px; }
